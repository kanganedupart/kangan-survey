<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>강안교육 만족도 조사 — 2027학년도 정규반 1학기 2차</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --bg: #f7f6f1;
    --card: #ffffff;
    --ink: #1a1a1a;
    --ink-2: #4a4a48;
    --ink-3: #8a8a84;
    --line: #e6e3d8;
    --line-2: #d4d1c4;
    --accent: #1f3864;
    --accent-soft: #e7ecf5;
    --warn: #b8540a;
    --good: #2d6a4f;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(31,56,100,.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Pretendard', -apple-system, system-ui, sans-serif; font-size: 16px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; display: flex; flex-direction: column; }

  /* 상단 진행률 */
  .topbar { position: sticky; top: 0; z-index: 50; background: rgba(247,246,241,.92); backdrop-filter: saturate(140%) blur(8px); border-bottom: 1px solid var(--line); }
  .topbar-inner { max-width: 760px; margin: 0 auto; padding: 14px 20px 10px; }
  .brand { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .brand-name { font-weight: 700; letter-spacing: -0.02em; font-size: 15px; color: var(--ink); }
  .brand-sub { font-size: 12px; color: var(--ink-3); font-weight: 500; }
  .progress { margin-top: 10px; height: 4px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .progress > span { display: block; height: 100%; background: var(--accent); width: 0%; transition: width .35s cubic-bezier(.2,.8,.2,1); }
  .step-label { margin-top: 6px; font-size: 11.5px; color: var(--ink-3); letter-spacing: -0.01em; font-weight: 500; }

  /* 메인 카드 */
  main { flex: 1; max-width: 760px; width: 100%; margin: 0 auto; padding: 24px 20px 120px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px 24px; box-shadow: var(--shadow); }
  .section-num { display: inline-block; font-size: 11.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); background: var(--accent-soft); padding: 4px 9px; border-radius: 4px; }
  .section-title { font-size: 22px; font-weight: 700; letter-spacing: -0.025em; margin: 12px 0 6px; color: var(--ink); }
  .section-desc { font-size: 14px; color: var(--ink-2); margin-bottom: 20px; line-height: 1.6; }
  .section-desc.notice { background: #fff8ec; border: 1px solid #f0e0b8; padding: 12px 14px; border-radius: 8px; }

  /* 문항 */
  .q { padding: 18px 0; border-top: 1px solid var(--line); }
  .q:first-of-type { border-top: 0; padding-top: 0; }
  .q-label { font-size: 15.5px; font-weight: 600; color: var(--ink); margin-bottom: 12px; line-height: 1.5; letter-spacing: -0.015em; }
  .q-num { color: var(--ink-3); font-weight: 500; margin-right: 4px; }

  /* 5점 척도 */
  .scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .scale label { display: flex; align-items: center; justify-content: center; min-height: 56px; padding: 10px 6px; border: 1px solid var(--line-2); border-radius: 8px; background: #fcfcf9; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--ink-2); text-align: center; line-height: 1.25; transition: all .15s; user-select: none; letter-spacing: -0.01em; }
  .scale label:hover { border-color: var(--accent); }
  .scale input { position: absolute; opacity: 0; pointer-events: none; }
  .scale input:checked + label { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .scale-wrap { position: relative; }

  /* 라디오 일반 (Type, 성별 등) */
  .radios { display: flex; flex-wrap: wrap; gap: 8px; }
  .radios label { padding: 10px 16px; border: 1px solid var(--line-2); border-radius: 8px; background: #fcfcf9; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--ink-2); transition: all .15s; }
  .radios label:hover { border-color: var(--accent); }
  .radios input { position: absolute; opacity: 0; pointer-events: none; }
  .radios input:checked + label { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .radios.stack label { width: 100%; }

  /* select & input */
  select, .input { width: 100%; padding: 12px 14px; font-size: 15px; font-family: inherit; border: 1px solid var(--line-2); border-radius: 8px; background: #fcfcf9; color: var(--ink); transition: border-color .15s; -webkit-appearance: none; appearance: none; }
  select { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1L6 6L11 1' stroke='%234a4a48' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px; }
  select:focus, .input:focus { outline: none; border-color: var(--accent); }
  textarea.input { min-height: 88px; resize: vertical; line-height: 1.55; }

  .field { margin-bottom: 16px; }
  .field-label { display: block; font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
  .field-help { font-size: 12.5px; color: var(--ink-3); margin-top: 6px; }

  /* 버튼 영역 */
  .actions { display: flex; gap: 10px; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--line); }
  .btn { flex: 1; padding: 14px 20px; font-size: 15px; font-weight: 600; font-family: inherit; border-radius: 8px; cursor: pointer; transition: all .15s; letter-spacing: -0.01em; min-height: 50px; }
  .btn-primary { background: var(--accent); color: #fff; border: 1px solid var(--accent); }
  .btn-primary:hover { background: #16294a; }
  .btn-primary:disabled { background: var(--line-2); border-color: var(--line-2); color: #fff; cursor: not-allowed; }
  .btn-secondary { background: #fff; color: var(--ink-2); border: 1px solid var(--line-2); }
  .btn-secondary:hover { border-color: var(--ink-3); }

  /* 시작 화면 */
  .welcome .section-title { font-size: 26px; }
  .welcome-quote { background: #faf8f1; border-left: 3px solid var(--accent); padding: 16px 18px; font-size: 14.5px; color: var(--ink-2); line-height: 1.7; margin: 18px 0 24px; border-radius: 4px; }
  .welcome .field { margin-bottom: 14px; }

  /* 완료 화면 */
  .done-icon { width: 48px; height: 48px; margin: 0 auto 18px; border: 2px solid var(--good); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .done-icon::after { content: ''; width: 18px; height: 9px; border-left: 2px solid var(--good); border-bottom: 2px solid var(--good); transform: rotate(-45deg) translate(2px, -2px); }
  .done-card { text-align: center; }
  .done-quote { background: #f1f7f3; padding: 18px; border-radius: 8px; font-size: 14.5px; color: var(--ink-2); line-height: 1.7; margin: 20px 0; }
  .done-meta { font-size: 12.5px; color: var(--ink-3); margin-top: 16px; }

  /* 에러 */
  .err { color: var(--warn); font-size: 12.5px; margin-top: 6px; }

  /* 반응형 */
  @media (max-width: 540px) {
    .card { padding: 22px 18px; border-radius: 8px; }
    .section-title { font-size: 19px; }
    .scale { grid-template-columns: 1fr; gap: 5px; }
    .scale label { min-height: 44px; flex-direction: row; justify-content: flex-start; padding-left: 14px; font-size: 14px; }
    .scale label::before { content: ''; width: 16px; height: 16px; border: 1.5px solid var(--line-2); border-radius: 50%; margin-right: 10px; flex-shrink: 0; transition: all .15s; }
    .scale input:checked + label::before { border-color: #fff; background: #fff; box-shadow: inset 0 0 0 3px var(--accent); }
    main { padding: 16px 12px 100px; }
  }

  /* 미리보기(개발자용) */
  .preview-toggle { position: fixed; right: 14px; bottom: 14px; z-index: 40; background: rgba(0,0,0,.78); color: #fff; border: 0; font-size: 11.5px; padding: 8px 12px; border-radius: 999px; font-family: inherit; cursor: pointer; opacity: .6; }
  .preview-toggle:hover { opacity: 1; }
  .preview { position: fixed; right: 14px; bottom: 56px; z-index: 41; max-width: 360px; max-height: 60vh; overflow: auto; background: #1a1a1a; color: #d8d8d8; padding: 14px; border-radius: 8px; font-family: 'SF Mono', Menlo, monospace; font-size: 11px; line-height: 1.5; display: none; white-space: pre-wrap; }
  .preview.on { display: block; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-name">강안교육 만족도 조사</span>
      <span class="brand-sub">2027학년도 정규반 1학기 2차</span>
    </div>
    <div class="progress"><span id="bar"></span></div>
    <div class="step-label" id="stepLabel">시작 전</div>
  </div>
</div>

<main id="app"></main>

<button class="preview-toggle" onclick="document.getElementById('preview').classList.toggle('on')">▤ 데이터 미리보기</button>
<div class="preview" id="preview">아직 응답 없음</div>

<script>
/* ============================================================
 *  강안교육 만족도 조사 — 학생 응시 페이지 (시제품)
 *  실제 운영 시: 강의실/담임/학사 마스터 데이터는 Firestore에서 로드
 *               제출은 fetch() → Firestore 'responses' 컬렉션
 * ============================================================ */

// 5점 척도 라벨
const SCALE = ['매우 그렇다', '그렇다', '보통', '아니다', '매우 아니다'];

// 시제품 더미 마스터 데이터 (실제 운영시 DB 로드)
const ROOMS = {
  국수영_type1: ['(월) 302호 백종수','(월) 303호 김학림','(월) 304호 황범희','(월) 305호 전종현'],
  국수영_type2: ['(월) 401호 이민호','(월) 402호 신현철','(월) 403호 임명훈','(월) 404호 김종훈'],
  탐구: ['(화) 17:00 305호 백종수 - 생명과학','(화) 18:00 305호 김학림 - 지구과학','(수) 17:00 304호 황범희 - 화학','(수) 18:00 304호 전종현 - 물리','해당 없음'],
  논술: ['연세대 논술 - 김교수','고려대 논술 - 이교수','서울대 정시 면접 - 박교수','해당 없음'],
  특강: ['미적분 심화특강','확통 빈출유형','영어 1등급특강','국어 비문학','해당 없음']
};
const HOMEROOMS = ['전종현','김학림','황범희','백종수','조영신','이민호','신현철'];
const HAKSAS = ['강남학사','교대학사','대치일타학사','명문학사','베스트학사','아카데미학사','에이원학사','이편한레지던스','정효학사','케일리학사','태원학사','훼미리학사','해당 없음'];

// 8개 섹션 + 시작/완료 = 10단계
const STEPS = [
  { id: 'welcome', label: '시작' },
  { id: 'basic', label: '기본정보' },
  { id: 'office', label: '교무운영' },
  { id: 'class_main', label: '수업 - 국수영' },
  { id: 'class_t1', label: '수업 - 탐구1' },
  { id: 'class_t2', label: '수업 - 탐구2' },
  { id: 'class_essay', label: '수업 - 논술' },
  { id: 'class_special', label: '수업 - 특강' },
  { id: 'homeroom', label: '담임상담' },
  { id: 'daily', label: '매일깨기' },
  { id: 'meal', label: '급식' },
  { id: 'dorm', label: '학사 운영' },
  { id: 'etc', label: '기타' },
  { id: 'done', label: '제출 완료' }
];

let cur = 0;
const data = { meta: {}, answers: {} };

// === 렌더 ===
function render() {
  const step = STEPS[cur];
  const el = document.getElementById('app');
  el.innerHTML = STEP_RENDERERS[step.id]();
  document.getElementById('bar').style.width = ((cur) / (STEPS.length - 1) * 100) + '%';
  document.getElementById('stepLabel').textContent = `${cur === 0 ? '' : cur + ' / ' + (STEPS.length - 2) + ' · '}${step.label}`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updatePreview();
}

function next() { if (cur < STEPS.length - 1) { cur++; render(); } }
function prev() { if (cur > 0) { cur--; render(); } }
function go(i) { cur = i; render(); }

function updatePreview() {
  document.getElementById('preview').textContent = JSON.stringify(data, null, 2);
}

// === 헬퍼 ===
function scaleHtml(name, qLabel, qNum) {
  return `
    <div class="q" data-q="${name}">
      <div class="q-label"><span class="q-num">${qNum})</span>${qLabel}</div>
      <div class="scale-wrap"><div class="scale">
        ${SCALE.map((s, i) => {
          const v = 5 - i;
          const id = `${name}_${v}`;
          const checked = (data.answers[name] === v) ? 'checked' : '';
          return `<input type="radio" name="${name}" id="${id}" value="${v}" ${checked} onchange="setAnswer('${name}', ${v})"><label for="${id}">${s}</label>`;
        }).join('')}
      </div></div>
    </div>`;
}

function freeHtml(name, label) {
  const v = data.answers[name] || '';
  return `
    <div class="q" data-q="${name}">
      <div class="q-label">${label} <span style="font-size:12px;color:var(--ink-3);font-weight:500;">(자유응답)</span></div>
      <textarea class="input" name="${name}" placeholder="자유롭게 작성해 주세요. 작성하지 않으셔도 됩니다." oninput="setAnswer('${name}', this.value)">${v}</textarea>
    </div>`;
}

function selectHtml(name, label, options, help = '') {
  const v = data.answers[name] || '';
  return `
    <div class="field">
      <label class="field-label">${label}</label>
      <select onchange="setAnswer('${name}', this.value)">
        <option value="">선택하세요</option>
        ${options.map(o => `<option value="${o}" ${v === o ? 'selected' : ''}>${o}</option>`).join('')}
      </select>
      ${help ? `<div class="field-help">${help}</div>` : ''}
    </div>`;
}

function setAnswer(k, v) {
  data.answers[k] = v;
  updatePreview();
}

function setMeta(k, v) {
  data.meta[k] = v;
  // basic 단계에서 다음 버튼 활성화 동기화
  if (STEPS[cur].id === 'basic') {
    const btn = document.querySelector('.btn-primary');
    if (btn) btn.disabled = !data.meta.type || !data.meta.gender;
  }
  updatePreview();
}

function actions(opts = {}) {
  const { showPrev = true, nextLabel = '다음', nextDisabled = false, onNext = 'next()' } = opts;
  return `
    <div class="actions">
      ${showPrev ? `<button class="btn btn-secondary" onclick="prev()">이전</button>` : ''}
      <button class="btn btn-primary" onclick="${onNext}" ${nextDisabled ? 'disabled' : ''}>${nextLabel}</button>
    </div>`;
}

// === 단계별 렌더러 ===
const STEP_RENDERERS = {

  // 0. 시작
  welcome: () => `
    <div class="card welcome">
      <span class="section-num">START</span>
      <h1 class="section-title">2027학년도 정규반 1학기 2차 만족도 조사</h1>
      <div class="welcome-quote">
        본 설문은 강안교육 정규반 과정을 수강하고 있는 재원생들의 귀중한 의견을 듣고자 마련했습니다.<br>
        여러분이 주신 소중한 의견을 바탕으로 강안교육은 더 나은 학습 환경과 면학분위기 조성을 위해 최선을 다하겠습니다.<br>
        감사합니다.
      </div>

      <div class="field">
        <label class="field-label">이름</label>
        <input class="input" type="text" placeholder="홍길동" value="${data.meta.name || ''}" oninput="setMeta('name', this.value); document.getElementById('startBtn').disabled = !(data.meta.name && data.meta.studentId);">
      </div>
      <div class="field">
        <label class="field-label">학번</label>
        <input class="input" type="text" inputmode="numeric" placeholder="2027001" value="${data.meta.studentId || ''}" oninput="setMeta('studentId', this.value); document.getElementById('startBtn').disabled = !(data.meta.name && data.meta.studentId);">
        <div class="field-help">이코딩 로그인 학번과 동일합니다. 본인 이름으로만 응시 가능합니다.</div>
      </div>

      <div class="actions" style="border-top:0; padding-top: 8px;">
        <button id="startBtn" class="btn btn-primary" onclick="next()" ${(data.meta.name && data.meta.studentId) ? '' : 'disabled'}>설문 시작</button>
      </div>
      <p style="font-size:12px;color:var(--ink-3);margin-top:14px;text-align:center;">총 8개 섹션 · 약 5–8분 소요</p>
    </div>`,

  // 1. 기본정보
  basic: () => `
    <div class="card">
      <span class="section-num">SECTION 1</span>
      <h2 class="section-title">기본정보</h2>
      <p class="section-desc">해당하는 사항을 선택해 주십시오.</p>

      <div class="field">
        <label class="field-label">1) 해당하는 타입을 선택해 주십시오</label>
        <div class="radios stack">
          ${[
            ['Type 1','Type 1 — 월요일에 수학(미적분/확률과 통계)을 수강'],
            ['Type 2','Type 2 — 월요일에 국어 또는 영어를 수강']
          ].map(([v,l],i) => `
            <input type="radio" name="type" id="type_${i}" value="${v}" ${data.meta.type===v?'checked':''} onchange="setMeta('type','${v}')"><label for="type_${i}">${l}</label>
          `).join('')}
        </div>
      </div>

      <div class="field">
        <label class="field-label">2) 성별을 선택해 주십시오</label>
        <div class="radios">
          ${['남자','여자'].map((v,i) => `
            <input type="radio" name="gender" id="gen_${i}" value="${v}" ${data.meta.gender===v?'checked':''} onchange="setMeta('gender','${v}')"><label for="gen_${i}">${v}</label>
          `).join('')}
        </div>
      </div>

      ${actions({ nextDisabled: !data.meta.type || !data.meta.gender })}
    </div>`,

  // 2. 교무운영
  office: () => `
    <div class="card">
      <span class="section-num">SECTION 2</span>
      <h2 class="section-title">교무운영</h2>
      <p class="section-desc">출결관리 및 면학분위기 관련 질문입니다.</p>
      ${scaleHtml('office_q1','아침출결 및 지각관리가 잘 진행되었다고 생각하십니까?','1')}
      ${scaleHtml('office_q2','매일깨기(새벽깨기 포함) 미응시자 관리가 누락 없이 잘 진행되었다고 생각하십니까?','2')}
      ${scaleHtml('office_q3','재원생 간 대화금지 관리를 통해, 강의실 내 정숙한 면학분위기가 조성되었다고 생각하십니까?','3')}
      ${scaleHtml('office_q4','재원생에 대한 졸음금지 관리가 적절하게 이루어졌습니까?','4')}
      ${scaleHtml('office_q5','교무지원실 등에서 교직원의 안내 및 지도가 잘 진행되었다고 생각하십니까?','5')}
      ${freeHtml('office_free','6) 학습관리 및 생활관리에 만족하는 부분이나 건의하고 싶은 점은 무엇입니까?')}
      ${actions()}
    </div>`,

  // 3. 수업영역 - 국수영

// 응시 키 (분기/회차별로 분리)
const SURVEY_KEY = 'kangan_survey_done_2027-1-2'; // 2027학년도 1학기 2차

function submit() {
  data.meta.submittedAt = new Date().toISOString();
  console.log('[제출 데이터]', data);
  try {
    localStorage.setItem('lastSurvey_' + data.meta.studentId, JSON.stringify(data));
    // 1회 응시 마킹
    localStorage.setItem(SURVEY_KEY, JSON.stringify({
      name: data.meta.name,
      studentId: data.meta.studentId,
      submittedAt: data.meta.submittedAt
    }));
  } catch(e) {}
  cur = STEPS.length - 1;
  render();
}

// 페이지 로드 시 응시 완료 여부 확인
(function checkAlreadySubmitted() {
  try {
    const done = localStorage.getItem(SURVEY_KEY);
    if (done) {
      const info = JSON.parse(done);
      const submittedDate = new Date(info.submittedAt).toLocaleString('ko-KR');
      // 응시 완료 안내 화면
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f7f6f1;font-family:'Pretendard',-apple-system,system-ui,sans-serif;">
          <div style="background:#fff;border:1px solid #e6e3d8;border-radius:12px;padding:36px 32px;max-width:460px;width:100%;box-shadow:0 6px 24px rgba(0,0,0,0.04);text-align:center;">
            <div style="font-size:48px;margin-bottom:12px;">✓</div>
            <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.025em;color:#1a1a1a;margin:0 0 8px;">이미 응시하셨습니다</h1>
            <p style="font-size:14px;color:#8a8a84;margin:0 0 22px;line-height:1.6;">

              제출 시각: ${submittedDate}

            <div style="background:#f7f6f1;border-radius:8px;padding:14px 16px;font-size:13px;color:#4a4a48;line-height:1.55;text-align:left;margin-bottom:18px;">
